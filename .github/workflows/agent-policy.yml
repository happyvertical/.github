name: Agent Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review, converted_to_draft, labeled, unlabeled]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request to recheck after released_at or another claim-only transition
        required: true
        type: number

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: read
  packages: read

concurrency:
  group: >-
    agent-policy-authority-${{
      github.event.merge_group.head_sha ||
      github.event.pull_request.number ||
      inputs.pr_number ||
      github.ref
    }}
  cancel-in-progress: true

jobs:
  lifecycle:
    name: lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Select source-owned policy lock
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          source_repository=$(gh api repos/happyvertical/.github --jq '.id')
          test "$source_repository" = 1129270614 || {
            echo "trusted policy source repository id is $source_repository, expected 1129270614" >&2
            exit 1
          }
          active_lock="$RUNNER_TEMP/hv-agent-policy-active-lock.json"
          gh api 'repos/happyvertical/.github/contents/.github/agent-policy-lock.json?ref=main' \
            --jq '.content' | base64 --decode > "$active_lock"
          selected_lock="$RUNNER_TEMP/hv-agent-policy-selected-lock.json"
          python3 - "$active_lock" '.github/agent-policy-lock.json' "$selected_lock" <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          AUTHORITY_REPOSITORY_ID = "1129270614"
          ARTIFACT = re.compile(r"ghcr\.io/happyvertical/agent-policy@sha256:[0-9a-f]{64}")
          OID = re.compile(r"[0-9a-f]{40}")
          TREE = re.compile(r"[0-9a-f]{64}")
          FIELDS = {
              "schema", "artifact", "generation", "policy_revision",
              "source_commit", "source_tree_sha256",
          }

          def load_lock(path: Path, label: str):
              try:
                  value = json.loads(path.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError) as exc:
                  raise SystemExit(f"{label} policy lock is unreadable: {exc}")
              if not isinstance(value, dict) or set(value) != FIELDS:
                  raise SystemExit(f"{label} policy lock has unexpected fields")
              if value.get("schema") != "hv-agent-policy-lock:v1":
                  raise SystemExit(f"{label} policy lock has an unsupported schema")
              if not isinstance(value.get("artifact"), str) or not ARTIFACT.fullmatch(value["artifact"]):
                  raise SystemExit(f"{label} policy lock has an invalid artifact digest")
              generation = value.get("generation")
              if isinstance(generation, bool) or not isinstance(generation, int) or generation < 1:
                  raise SystemExit(f"{label} policy lock has an invalid generation")
              if not isinstance(value.get("policy_revision"), str) or not value["policy_revision"]:
                  raise SystemExit(f"{label} policy lock has an invalid policy revision")
              if not isinstance(value.get("source_commit"), str) or not OID.fullmatch(value["source_commit"]):
                  raise SystemExit(f"{label} policy lock has an invalid source commit")
              if not isinstance(value.get("source_tree_sha256"), str) or not TREE.fullmatch(value["source_tree_sha256"]):
                  raise SystemExit(f"{label} policy lock has an invalid source tree")
              return value

          active_path, candidate_path, selected_path = map(Path, sys.argv[1:])
          active = load_lock(active_path, "active")
          selected = active
          if os.environ.get("TARGET_REPOSITORY_ID") == AUTHORITY_REPOSITORY_ID and candidate_path.is_file():
              candidate = load_lock(candidate_path, "candidate")
              if candidate != active:
                  if candidate["generation"] <= active["generation"]:
                      raise SystemExit(
                          "candidate policy lock must use a generation strictly newer "
                          "than the active source lock"
                      )
                  selected = candidate
          selected_path.write_text(json.dumps(selected, sort_keys=True) + "\n", encoding="utf-8")
          PY
          artifact=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["artifact"])' "$selected_lock")
          echo "HV_POLICY_ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "HV_POLICY_LOCK=$selected_lock" >> "$GITHUB_ENV"
      - name: Load locked policy runtime
        env:
          POLICY_ARTIFACT: ${{ env.HV_POLICY_ARTIFACT }}
          POLICY_PUBLISHER_IDENTITY: ${{ vars.AGENT_POLICY_PUBLISHER_IDENTITY }}
        run: |
          case "$POLICY_ARTIFACT" in
            ghcr.io/happyvertical/agent-policy@sha256:*) ;;
            *) echo 'source-owned policy lock must pin the trusted HappyVertical policy image by digest' >&2; exit 1 ;;
          esac
          expected_publisher_identity_sha256=86a917ce537a9e923ce02103068c76eb72629247ab584f7d368ac238a0209857
          publisher_identity_sha256=$(python3 -c 'import hashlib, os; print(hashlib.sha256(os.environ["POLICY_PUBLISHER_IDENTITY"].encode()).hexdigest())')
          test "$publisher_identity_sha256" = "$expected_publisher_identity_sha256" || {
            echo 'AGENT_POLICY_PUBLISHER_IDENTITY must match the exact protected-main publisher identity' >&2
            exit 1
          }
          publisher_workflow="${POLICY_PUBLISHER_IDENTITY%@refs/heads/main}"
          test "$publisher_workflow" != "$POLICY_PUBLISHER_IDENTITY" || {
            echo 'AGENT_POLICY_PUBLISHER_IDENTITY must name the protected-main publisher workflow' >&2
            exit 1
          }
          publisher_workflow_regexp=$(printf '%s' "$publisher_workflow" | sed 's/[][\.*^()+?{}|$]/\\&/g')
          cosign verify "$POLICY_ARTIFACT" \
            --certificate-identity-regexp "^${publisher_workflow_regexp}@refs/(heads/main|tags/agent-policy-v[0-9]+\.[0-9]+\.[0-9]+)$" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
          policy_download_dir="$RUNNER_TEMP/hv-policy-download"
          policy_dir="$RUNNER_TEMP/hv-policy"
          rm -rf "$policy_download_dir" "$policy_dir"
          mkdir -p "$policy_download_dir" "$policy_dir"
          oras pull "$POLICY_ARTIFACT" -o "$policy_download_dir"
          archive="$policy_download_dir/agent-policy.tar.gz"
          test -f "$archive" || { echo 'policy artifact is missing agent-policy.tar.gz' >&2; exit 1; }
          python3 - "$archive" <<'PY'
          import pathlib
          import sys
          import tarfile

          with tarfile.open(sys.argv[1], "r:gz") as archive:
              for member in archive.getmembers():
                  path = pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts or member.issym() or member.islnk():
                      raise SystemExit(f"unsafe policy archive member: {member.name}")
          PY
          tar -xzf "$archive" -C "$policy_dir"
          identity=$(python3 "$policy_dir/scripts/verify-policy-artifact" "$policy_dir")
          python3 - "$HV_POLICY_LOCK" "$policy_dir/policy-artifact.json" "$POLICY_ARTIFACT" <<'PY'
          import json
          import sys

          lock = json.load(open(sys.argv[1], encoding="utf-8"))
          manifest = json.load(open(sys.argv[2], encoding="utf-8"))
          expected = {
              "artifact": sys.argv[3],
              "generation": manifest.get("generation"),
              "policy_revision": manifest.get("policy_revision"),
              "source_commit": manifest.get("source_commit"),
              "source_tree_sha256": manifest.get("source_tree_sha256"),
          }
          for field, value in expected.items():
              if lock.get(field) != value:
                  raise SystemExit(
                      f"selected policy lock {field} does not match signed artifact manifest"
                  )
          PY
          echo "Loaded $identity from source-owned lock $POLICY_ARTIFACT"
          echo "HV_POLICY_DIR=$policy_dir" >> "$GITHUB_ENV"
          echo "HV_POLICY_IDENTITY=$identity" >> "$GITHUB_ENV"
      - name: Validate lifecycle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          POLICY_ARTIFACT: ${{ env.HV_POLICY_ARTIFACT }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail
          numbers_file="$RUNNER_TEMP/hv-agent-lifecycle-prs"
          "$HV_POLICY_DIR/scripts/hv-agent-lifecycle-prs" > "$numbers_file"
          while IFS= read -r number; do
            if ! python3 "$HV_POLICY_DIR/scripts/hv-agent" check-pr "$number"; then
              echo "ERROR $HV_POLICY_IDENTITY from $POLICY_ARTIFACT rejected PR #$number; correct canonical claim/PR state, then rerun the organization-required workflow execution; a repository-local lifecycle-only dispatch is not protected merge authority and draft toggles are invalid" >&2
              exit 1
            fi
          done < "$numbers_file"
