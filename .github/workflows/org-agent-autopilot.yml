name: Org Agent Autopilot

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: number
      action:
        description: 'Label action (labeled or unlabeled)'
        required: true
        type: string
      label_name:
        description: 'Label that triggered this workflow'
        required: true
        type: string
      project_id:
        description: 'Deprecated GitHub Projects board ID; retained during caller migration'
        required: false
        type: string
        default: ''
      status_field_id:
        description: 'Deprecated project Status field ID; retained during caller migration'
        required: false
        type: string
        default: ''
      status_in_progress_id:
        description: 'Deprecated In Progress option ID; retained during caller migration'
        required: false
        type: string
        default: ''
      status_review_id:
        description: 'Deprecated Review option ID; retained during caller migration'
        required: false
        type: string
        default: ''
      policy_artifact:
        description: 'Immutable public policy artifact (OCI reference with @sha256 digest)'
        required: false
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'Claude Code OAuth token'
        required: true
      GH_TOKEN:
        description: 'GitHub token for API access'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: autopilot-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false  # Don't cancel ongoing work

jobs:
  implement:
    if: "${{ inputs.action == 'labeled' && inputs.label_name == 'dispatch: claude' }}"
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ci-linux-x64' }}
    timeout-minutes: 60
    steps:
      - name: Check Issue State
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          STATE=$(gh issue view ${{ inputs.issue_number }} --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "Issue is closed, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Install OCI client
        if: steps.check.outputs.skip != 'true'
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Load pinned policy runtime
        if: steps.check.outputs.skip != 'true'
        env:
          POLICY_ARTIFACT: ${{ inputs.policy_artifact || vars.AGENT_POLICY_ARTIFACT }}
        run: |
          case "$POLICY_ARTIFACT" in
            ghcr.io/*@sha256:*) ;;
            *) echo 'policy_artifact must be an immutable GHCR digest' >&2; exit 1 ;;
          esac
          policy_dir="$RUNNER_TEMP/hv-policy"
          rm -rf "$policy_dir"
          mkdir -p "$policy_dir"
          oras pull "$POLICY_ARTIFACT" -o "$policy_dir"
          tar -xzf "$policy_dir/agent-policy.tar.gz" -C "$policy_dir"
          echo "HV_POLICY_DIR=$policy_dir" >> "$GITHUB_ENV"

      - name: Claim implementation
        if: steps.check.outputs.skip != 'true'
        id: claim
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SESSION_ID: github-actions:${{ github.run_id }}:${{ github.run_attempt }}
        run: |
          python3 "$HV_POLICY_DIR/scripts/hv-agent" claim '${{ inputs.issue_number }}' \
            --runtime claude \
            --owner github-actions \
            --session "$SESSION_ID" \
            --branch 'agent/issue-${{ inputs.issue_number }}' \
            --worktree "$GITHUB_WORKSPACE"

      - name: Start implementation heartbeat
        if: steps.claim.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SESSION_ID: github-actions:${{ github.run_id }}:${{ github.run_attempt }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          (
            while sleep 1800; do
              python3 "$HV_POLICY_DIR/scripts/hv-agent" heartbeat "$ISSUE_NUMBER" \
                --session "$SESSION_ID"
            done
          ) >"$RUNNER_TEMP/hv-agent-heartbeat.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/hv-agent-heartbeat.pid"

      - name: Configure Git
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            pnpm install || npm install
          fi
        continue-on-error: true

      - name: Run Claude Implementation
        if: steps.check.outputs.skip != 'true'
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE_NUMBER: ${{ inputs.issue_number }}

            You are implementing issue #${{ inputs.issue_number }} autonomously.

            ## Workflow

            1. **Read the issue**: `gh issue view ${{ inputs.issue_number }}`
            2. **Read AGENTS.md** and the repository manifest for repository guidelines
            3. **Create branch**: `git checkout -b agent/issue-${{ inputs.issue_number }}-[description]`
            4. **Implement** following existing patterns
            5. **Write/update tests**
            6. **Quality checks**: `pnpm typecheck && pnpm lint && pnpm test && pnpm build`
            7. **Commit**: `git commit -m "feat(scope): description\n\nCloses #${{ inputs.issue_number }}"`
            8. **Push**: `git push -u origin [branch]`
            9. **Create a draft PR while implementing**, closing issue #${{ inputs.issue_number }}.
               Include this metadata in the body with the actual validation commands:
               `<!-- hv-agent-run:v1 -->`
               `{"schema":"hv-agent-run:v1","runtime":"claude","session":"github-actions:${{ github.run_id }}:${{ github.run_attempt }}","issue":"${{ github.repository }}#${{ inputs.issue_number }}","policy_revision":"1.0.0","validation":["..."]}`

            Do not merge. The workflow will release the claim and mark the PR ready.

            ## If Blocked

            If you cannot complete the implementation (unclear requirements, need decisions, etc.):
            1. Post a comment on the issue explaining what you need
            2. Remove the `dispatch: claude` label so the workflow doesn't re-trigger
            3. The human can clarify and re-apply the label when ready

            ```bash
            gh issue comment ${{ inputs.issue_number }} --body "## Need Clarification\n\n[your questions here]\n\n---\n*Removing \`dispatch: claude\` label until clarified*"
            gh issue edit ${{ inputs.issue_number }} --remove-label "dispatch: claude"
            ```

          claude_args: |
            --allowedTools Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(pnpm:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(bun:*),Read,Write,Edit,Glob,Grep,Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*),Bash(rm:*)

      - name: Stop implementation heartbeat
        if: always() && steps.claim.outcome == 'success'
        run: |
          if [ -f "$RUNNER_TEMP/hv-agent-heartbeat.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/hv-agent-heartbeat.pid")" 2>/dev/null || true
          fi

      - name: Release completed implementation
        if: success() && steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SESSION_ID: github-actions:${{ github.run_id }}:${{ github.run_attempt }}
        run: |
          pr_number=$(gh pr list --state open --json number,closingIssuesReferences \
            --jq 'map(select(any(.closingIssuesReferences[]?; .number == ${{ inputs.issue_number }}))) | first | .number // empty')
          test -n "$pr_number" || { echo 'implementation completed without a linked PR' >&2; exit 1; }
          python3 "$HV_POLICY_DIR/scripts/hv-agent" release '${{ inputs.issue_number }}' \
            --session "$SESSION_ID" \
            --message "Implementation complete in PR #$pr_number; ready for review."

      - name: Post Failure Comment
        if: failure() && steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh issue comment ${{ inputs.issue_number }} --body "## Implementation Failed

          I encountered an error while implementing this issue.

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          The \`dispatch: claude\` label remains - remove it if you want to stop automated attempts.

          ---
          *Automated implementation by Claude*"

      - name: Release blocked implementation
        if: failure() && steps.claim.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SESSION_ID: github-actions:${{ github.run_id }}:${{ github.run_attempt }}
        run: |
          python3 "$HV_POLICY_DIR/scripts/hv-agent" release '${{ inputs.issue_number }}' \
            --session "$SESSION_ID" \
            --blocked \
            --message "Hosted implementation stopped. Review the workflow log and resume from the smallest failing step."
